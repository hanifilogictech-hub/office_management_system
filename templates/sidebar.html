<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
}

/* Sidebar */

.sidebar{
    width:260px;
    height:100vh;
    background:#0f172a;
    position:fixed;
    overflow-y:auto;
    padding-top:20px;
}

/* Logo */

.logo{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

/* Main Links */

.sidebar a,
.dropdown-btn{

    padding:14px 20px;
    text-decoration:none;
    color:white;
    display:block;
    width:100%;
    border:none;
    background:none;
    text-align:left;
    cursor:pointer;
    font-size:15px;
}

/* Hover */

.sidebar a:hover,
.dropdown-btn:hover{

    background:#1e293b;
}

/* Submenu */

.dropdown-container{

    display:none;
    background:#1e293b;
}

/* Submenu Links */

.dropdown-container a{

    padding-left:45px;
    font-size:14px;
    color:#cbd5e1;
}

/* Active Button */

.active{

    background:#334155;
}

</style>



<script>

var dropdown = document.getElementsByClassName("dropdown-btn");

for (var i = 0; i < dropdown.length; i++) {

    dropdown[i].addEventListener("click", function() {

        this.classList.toggle("active");

        var dropdownContent = this.nextElementSibling;

        if (dropdownContent.style.display === "block") {

            dropdownContent.style.display = "none";

        } else {

            dropdownContent.style.display = "block";
        }
    });
}

</script>
