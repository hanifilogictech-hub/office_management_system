<!DOCTYPE html>
<html>
<head>
    <title>Office Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#1e293b;
            position:fixed;
            color:white;
            padding-top:20px;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:12px 20px;
        }

        .sidebar a:hover{
            background:#334155;
        }

        .content{
            margin-left:250px;
            padding:20px;
        }

    </style>

</head>
<body>

    {% include 'sidebar.html' %}

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
